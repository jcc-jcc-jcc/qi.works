<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important; 
        }

        body {
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* The Italic Square Frame Cursor */
        #custom-cursor {
            width: 14px;
            height: 14px;
            border: 1px solid #000000; /* The "Frame" */
            background-color: transparent; /* See-through */
            
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            
            /* translate centers it, skewX(-15deg) makes it "italic" */
            transform: translate(-50%, -50%) skewX(-15deg);
            
            transition: border-color 0.3s ease, transform 0.2s ease, opacity 0.5s ease;
            opacity: 0;
        }

        h1 {
            font-size: 13px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            position: absolute;
            user-select: none;
            color: #000000;
            transition: color 0.3s ease;
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        /* Hover & Dragging effects */
        h1:hover { color: #C65102; }
        h1.dragging { color: #C65102 !important; }

        /* Frame turns orange and expands slightly on interaction */
        body.active-cursor #custom-cursor {
            border-color: #C65102;
            transform: translate(-50%, -50%) skewX(-15deg) scale(1.4);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const text = document.getElementById("drag-text");
        const cursor = document.getElementById("custom-cursor");
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        let mouseHasMoved = false;

        document.addEventListener("mousemove", (e) => {
            if(!mouseHasMoved) {
                cursor.style.opacity = "1";
                mouseHasMoved = true;
            }
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
            
            if (isDragging) {
                text.style.left = (e.clientX - offset.x) + "px";
                text.style.top = (e.clientY - offset.y) + "px";
            }
        });

        text.addEventListener("mouseenter", () => document.body.classList.add('active-cursor'));
        text.addEventListener("mouseleave", () => {
            if (!isDragging) document.body.classList.remove('active-cursor');
        });

        text.addEventListener("mousedown", (e) => {
            isDragging = true;
            text.classList.add('dragging');
            document.body.classList.add('active-cursor');
            offset.x = e.clientX - text.offsetLeft;
            offset.y = e.clientY - text.offsetTop;
            text.style.margin = "0"; 
            text.style.transform = "none";
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            text.classList.remove('dragging');
            const hoverElement = document.elementFromPoint(
                parseInt(cursor.style.left), 
                parseInt(cursor.style.top)
            );
            if (hoverElement !== text) {
                document.body.classList.remove('active-cursor');
            }
        });

        // Touch support
        text.addEventListener("touchstart", (e) => {
            isDragging = true;
            const touch = e.touches[0];
            offset.x = touch.clientX - text.offsetLeft;
            offset.y = touch.clientY - text.offsetTop;
        });

        document.addEventListener("touchmove", (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            text.style.left = (touch.clientX - offset.x) + "px";
            text.style.top = (touch.clientY - offset.y) + "px";
        }, { passive: false });

        document.addEventListener("touchend", () => isDragging = false);
    </script>

</body>
</html>
