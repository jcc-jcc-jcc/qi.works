<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        /* 1. Font Registration */
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        /* 2. Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 3. The Refined Text */
        h1 {
            font-size: 13px;           /* Updated size */
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.1em;     /* Slightly tighter for 13px */
            text-transform: lowercase; 
            
            /* Clean fade-in */
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>quiet intelligence</h1>

</body>
</html>
