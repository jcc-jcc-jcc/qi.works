<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            font-size: 13px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            position: absolute;
            cursor: grab;
            user-select: none;
            
            /* Smooth color transition */
            color: #000000;
            transition: color 0.3s ease;
            
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        /* Hover effect */
        h1:hover {
            color: #C65102;
        }

        /* Class to keep color orange while dragging */
        h1.dragging {
            color: #C65102 !important;
            cursor: grabbing;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const text = document.getElementById("drag-text");
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        // Start Dragging
        const startDrag = (e) => {
            isDragging = true;
            text.classList.add('dragging'); // Turn it orange
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            offset.x = clientX - text.offsetLeft;
            offset.y = clientY - text.offsetTop;
        };

        // Moving
        const doDrag = (e) => {
            if (!isDragging) return;
            e.preventDefault(); // Prevents screen scrolling on mobile
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            text.style.left = (clientX - offset.x) + "px";
            text.style.top = (clientY - offset.y) + "px";
            text.style.margin = "0"; 
            text.style.transform = "none";
        };

        // Stop Dragging
        const stopDrag = () => {
            isDragging = false;
            text.classList.remove('dragging'); // Return to black (unless hovering)
        };

        // Mouse Events
        text.addEventListener("mousedown", startDrag);
        document.addEventListener("mousemove", doDrag);
        document.addEventListener("mouseup", stopDrag);

        // Touch Events
        text.addEventListener("touchstart", startDrag);
        document.addEventListener("touchmove", doDrag, { passive: false });
        document.addEventListener("touchend", stopDrag);
    </script>

</body>
</html>
