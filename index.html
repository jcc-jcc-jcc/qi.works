<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Hides the default system cursor everywhere on the page */
            cursor: none !important; 
        }

        body {
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* The Custom Ball Cursor */
        #custom-cursor {
            width: 10px;
            height: 10px;
            background-color: #000000;
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none; /* Allows clicks to pass through the ball to the text */
            z-index: 9999;
            transition: transform 0.1s ease, background-color 0.3s ease;
            transform: translate(-50%, -50%); /* Centers the ball on the mouse tip */
        }

        h1 {
            font-size: 13px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            position: absolute;
            user-select: none;
            color: #000000;
            transition: color 0.3s ease;
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        /* Hover & Dragging states */
        h1:hover { color: #C65102; }
        h1.dragging { color: #C65102 !important; }

        /* Make the ball turn orange when interacting */
        body.active-cursor #custom-cursor {
            background-color: #C65102;
            transform: translate(-50%, -50%) scale(1.5); /* Makes the ball slightly larger */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const text = document.getElementById("drag-text");
        const cursor = document.getElementById("custom-cursor");
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        // 1. Follow Mouse Movement
        document.addEventListener("mousemove", (e) => {
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
            
            if (isDragging) {
                text.style.left = (e.clientX - offset.x) + "px";
                text.style.top = (e.clientY - offset.y) + "px";
            }
        });

        // 2. Interaction (Colors & Scaling)
        text.addEventListener("mouseenter", () => document.body.classList.add('active-cursor'));
        text.addEventListener("mouseleave", () => {
            if (!isDragging) document.body.classList.remove('active-cursor');
        });

        // 3. Dragging Logic
        text.addEventListener("mousedown", (e) => {
            isDragging = true;
            text.classList.add('dragging');
            document.body.classList.add('active-cursor');
            
            offset.x = e.clientX - text.offsetLeft;
            offset.y = e.clientY - text.offsetTop;
            
            // Remove initial centering
            text.style.margin = "0"; 
            text.style.transform = "none";
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            text.classList.remove('dragging');
            document.body.classList.remove('active-cursor');
        });

        // 4. Mobile/Touch Support (Cursor is hidden on touch devices usually)
        text.addEventListener("touchstart", (e) => {
            isDragging = true;
            const touch = e.touches[0];
            offset.x = touch.clientX - text.offsetLeft;
            offset.y = touch.clientY - text.offsetTop;
        });

        document.addEventListener("touchmove", (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            text.style.left = (touch.clientX - offset.x) + "px";
            text.style.top = (touch.clientY - offset.y) + "px";
        }, { passive: false });

        document.addEventListener("touchend", () => {
            isDragging = false;
        });
    </script>

</body>
</html>
