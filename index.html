<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        @font-face {
            font-family: 'qi-font';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold; font-style: italic; font-display: swap;
        }

        /* Nuclear Hide + Reset */
        *, html, body { 
            margin: 0; padding: 0; box-sizing: border-box; 
            cursor: none !important; 
        }

        body {
            background: #fff; color: #000;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'qi-font', sans-serif; -webkit-font-smoothing: antialiased;
        }

        /* Italic Frame Cursor */
        #cursor {
            position: fixed; z-index: 9999; pointer-events: none;
            width: 14px; height: 14px; border: 1px solid #000;
            transform: translate(-50%, -50%) skewX(-15deg);
            transition: border-color .3s, transform .2s, opacity .5s;
            opacity: 0; display: none;
        }

        @media (hover: hover) { #cursor { display: block; } }

        h1 {
            font-size: 13px; font-weight: bold; font-style: italic;
            letter-spacing: 0.1em; text-transform: lowercase;
            position: absolute; user-select: none;
            opacity: 0; animation: fade 2.5s ease forwards;
            transition: color .3s;
        }

        /* Interaction States */
        body.active h1 { color: #C65102; }
        body.active #cursor { border-color: #C65102; transform: translate(-50%, -50%) skewX(-15deg) scale(1.5); }

        @keyframes fade { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <h1 id="drag">quiet intelligence</h1>

    <script>
        const el = document.getElementById("drag"), cur = document.getElementById("cursor"), body = document.body;
        let dragging = false, offset = { x: 0, y: 0 };

        const getPos = (e) => ({ x: e.clientX || e.touches[0].clientX, y: e.clientY || e.touches[0].clientY });

        const start = (e) => {
            dragging = true; body.classList.add('active');
            const p = getPos(e);
            offset = { x: p.x - el.offsetLeft, y: p.y - el.offsetTop };
            el.style.margin = "0"; el.style.transform = "none";
        };

        const move = (e) => {
            const p = getPos(e);
            cur.style.opacity = "1";
            cur.style.left = `${p.x}px`; cur.style.top = `${p.y}px`;
            if (dragging) { el.style.left = `${p.x - offset.x}px`; el.style.top = `${p.y - offset.y}px`; }
        };

        const end = (e) => {
            dragging = false;
            const p = e.changedTouches ? e.changedTouches[0] : e;
            if (document.elementFromPoint(p.clientX, p.clientY) !== el) body.classList.remove('active');
        };

        // Desktop Events
        document.addEventListener("mousemove", move);
        el.addEventListener("mousedown", start);
        document.addEventListener("mouseup", end);
        el.addEventListener("mouseenter", () => body.classList.add('active'));
        el.addEventListener("mouseleave", () => !dragging && body.classList.remove('active'));

        // Mobile Events
        el.addEventListener("touchstart", start);
        document.addEventListener("touchmove", (e) => { if(dragging) { e.preventDefault(); move(e); } }, { passive: false });
        document.addEventListener("touchend", end);
    </script>
</body>
</html>
