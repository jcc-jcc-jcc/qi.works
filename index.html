<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold; font-style: italic; font-display: swap;
        }

        /* 1. THE ORANGE CURSOR FIX */
        /* We use an encoded SVG to create a 'normal' arrow in your hex color */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><path fill='%23C65102' d='M0,0 l0,16 l4.5,-4.5 l3,6.5 l3,-1.5 l-3,-6.5 l6,0 z'/></svg>"), auto !important;
        }

        html, body {
            background-color: #ffffff;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex; justify-content: center; align-items: center;
        }

        /* 2. THE TEXT */
        h1 {
            font-size: 13px; font-weight: bold; font-style: italic;
            letter-spacing: 0.1em; text-transform: lowercase;
            position: absolute; color: #000;
            user-select: none;
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
            transition: color 0.3s;
        }

        /* It turns orange only when you touch/drag it */
        body.dragging-active h1 { color: #C65102; }
        h1:hover { color: #C65102; }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const el = document.getElementById("drag-text");
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        // HELPER: Get coordinates for both Mouse and Touch
        const getCoord = (e) => ({
            x: e.clientX || (e.touches && e.touches[0].clientX),
            y: e.clientY || (e.touches && e.touches[0].clientY)
        });

        const start = (e) => {
            isDragging = true;
            document.body.classList.add('dragging-active');
            const pos = getCoord(e);
            offset.x = pos.x - el.offsetLeft;
            offset.y = pos.y - el.offsetTop;
            el.style.margin = "0"; el.style.transform = "none";
        };

        const move = (e) => {
            if (!isDragging) return;
            const pos = getCoord(e);
            el.style.left = (pos.x - offset.x) + "px";
            el.style.top = (pos.y - offset.y) + "px";
        };

        const stop = () => {
            isDragging = false;
            document.body.classList.remove('dragging-active');
        };
