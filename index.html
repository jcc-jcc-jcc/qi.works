<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        /* Minimalist reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff; /* Clean white background */
            color: #1a1a1a;           /* Soft black text */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-rendering: optimizeLegibility;
        }

        h1 {
            font-weight: 300;          /* Light weight for a "quiet" feel */
            font-size: 1.5rem;         /* Subdued size */
            letter-spacing: 0.15em;    /* Breathing room between letters */
            text-transform: lowercase; /* Lowercase for a modern, humble look */
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards; /* Subtle fade-in effect */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.8; }
        }

        /* Subtle indicator that the site is live but pending */
        .dot {
            color: #d1d1d1;
        }
    </style>
</head>
<body>

    <h1>quiet intelligence<span class="dot">.</span></h1>

</body>
</html>
