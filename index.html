<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        /* 1. FONT REGISTRATION */
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        /* 2. GLOBAL RESET & TOTAL CURSOR HIDE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* This is now global to ensure the arrow is GONE on your laptop */
            cursor: none !important; 
        }

        html, body {
            background-color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. THE CUSTOM CURSOR (FRAME) */
        #custom-cursor {
            /* Hidden by default (for mobile/tablet) */
            display: none; 
            
            width: 14px;
            height: 14px;
            border: 1px solid #000000;
            background-color: transparent;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) skewX(-15deg);
            transition: border-color 0.3s ease, transform 0.2s ease, opacity 0.5s ease;
            opacity: 0;
        }

        /* ONLY show the custom frame on devices with a mouse/trackpad */
        @media (pointer: fine) {
            #custom-cursor {
                display: block;
            }
        }

        /* 4. THE MAIN TEXT */
        h1 {
            font-size: 13px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            position: absolute;
            user-select: none;
            color: #000000;
            transition: color 0.3s ease;
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        /* 5. INTERACTION STATES */
        body.active-interaction h1 {
            color: #C65102;
        }

        body.active-interaction #custom-cursor {
            border-color: #C65102;
            transform: translate(-50%, -50%) skewX(-15deg) scale(1.5);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const text = document.getElementById("drag-text");
        const cursor = document.getElementById("custom-cursor");
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        let hasMoved = false;

        // --- CURSOR & TEXT MOVEMENT ---
        document.addEventListener("mousemove", (e) => {
            if(!hasMoved) {
                cursor.style.opacity = "1";
                hasMoved = true;
            }
            
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
            
            if (isDragging) {
                text.style.left = (e.clientX - offset.x) + "px";
                text.style.top = (e.clientY - offset.y) + "px";
            }
        });

        // --- INTERACTION COLOR TOGGLES ---
        text.addEventListener("mouseenter", () => document.body.classList.add('active-interaction'));
        text.addEventListener("mouseleave", () => {
            if (!isDragging) document.body.classList.remove('active-interaction');
        });

        text.addEventListener("mousedown", (e) => {
            isDragging = true;
            document.body.classList.add('active-interaction');
            offset.x = e.clientX
