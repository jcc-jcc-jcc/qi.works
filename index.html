<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        /* Registering the main brand font */
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        /* Hard hide the standard arrow cursor everywhere */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important; 
        }

        html, body {
            background-color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Custom Text Cursor ("qi") */
        #custom-cursor {
            font-family: 'RadioGrotesk', sans-serif;
            font-size: 10px;           /* The requested size */
            font-weight: bold;
            font-style: italic;
            text-transform: lowercase;
            color: #000000;           /* Default color is black */
            
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;     /* CRITICAL: Clicks must pass through the text */
            z-index: 9999;
            transform: translate(-50%, -50%); /* Centers the text on the mouse point */
            
            /* Smooth transitions for color and scale changes */
            transition: color 0.3s ease, transform 0.2s ease, opacity 0.5s ease;
            
            /* Hide initially until mouse moves to prevent weird placement on load */
            opacity: 0;
        }

        h1 {
            font-size: 13px;
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            position: absolute;
            user-select: none;
            color: #000000;
            transition: color 0.3s ease;
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        /* Interaction states for the main text */
        h1:hover { color: #C65102; }
        h1.dragging { color: #C65102 !important; }

        /* Styles applied to the "qi" cursor when hovering/dragging */
        body.active-cursor #custom-cursor {
            color: #C65102;           /* Turns orange */
            transform: translate(-50%, -50%) scale(1.3); /* Grows slightly */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor">qi</div>
    
    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const text = document.getElementById("drag-text");
        const cursor = document.getElementById("custom-cursor");
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        let mouseHasMoved = false;

        // 1. Cursor Following (Mouse)
        document.addEventListener("mousemove", (e) => {
            // Reveal cursor on first move
            if(!mouseHasMoved) {
                cursor.style.opacity = "1";
                mouseHasMoved = true;
            }
            
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
            
            if (isDragging) {
                text.style.left = (e.clientX - offset.x) + "px";
                text.style.top = (e.clientY - offset.y) + "px";
            }
        });

        // 2. Hover Interactions (Color Changes)
        text.addEventListener("mouseenter", () => document.body.classList.add('active-cursor'));
        text.addEventListener("mouseleave", () => {
            if (!isDragging) document.body.classList.remove('active-cursor');
        });

        // 3. Dragging Logic
        text.addEventListener("mousedown", (e) => {
            isDragging = true;
            text.classList.add('dragging');
            document.body.classList.add('active-cursor'); // Keep orange while dragging
            
            offset.x = e.clientX - text.offsetLeft;
            offset.y = e.clientY - text.offsetTop;
            
            text.style.margin = "0"; 
            text.style.transform = "none";
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            text.classList.remove('dragging');
            
            // Clean up interaction state unless still hovering
            const hoverElement = document.elementFromPoint(
                parseInt(cursor.style.left), 
                parseInt(cursor.style.top)
            );
            if (hoverElement !== text) {
                document.body.classList.remove('active-cursor');
            }
        });

        // 4. Touch Support (The custom text cursor is usually irrelevant on mobile)
        text.addEventListener("touchstart", (e) => {
            isDragging = true;
            const touch = e.touches[0];
            offset.x = touch.clientX - text.offsetLeft;
            offset.y = touch.clientY - text.offsetTop;
        });

        document.addEventListener("touchmove", (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            text.style.left = (touch.clientX - offset.x) + "px";
            text.style.top = (touch.clientY - offset.y) + "px";
        }, { passive: false });

        document.addEventListener("touchend", () => isDragging = false);
    </script>

</body>
</html>
