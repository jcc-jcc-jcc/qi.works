<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        /* 1. FONT REGISTRATION */
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldInter.woff') format('woff'); /* Verify your filename extension! */
            font-weight: bold; font-style: italic; font-display: swap;
        }

        /* 2. THE FIX: TOTAL HIDE */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            /* This worked before, so we are sticking to it exactly */
            cursor: none !important; 
        }

        html, body {
            background-color: #ffffff;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
            /* Extra layer of protection */
            user-select: none; 
        }

        body {
            display: flex; justify-content: center; align-items: center;
        }

        /* 3. THE FRAME CURSOR */
        #custom-cursor {
            width: 14px; height: 14px;
            border: 1px solid #000;
            background: transparent;
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%) skewX(-15deg);
            transition: border-color 0.3s, transform 0.2s, opacity 0.5s;
            opacity: 0; /* Hidden until first movement */
        }

        /* 4. THE MAIN TEXT */
        h1 {
            font-size: 13px; font-weight: bold; font-style: italic;
            letter-spacing: 0.1em; text-transform: lowercase;
            position: absolute; color: #000;
            transition: color 0.3s;
            opacity: 0;
            animation: fadeIn 2.5s ease-in forwards;
        }

        /* INTERACTION STATES */
        body.active-cursor h1 { color: #C65102; }
        body.active-cursor #custom-cursor {
            border-color: #C65102;
            transform: translate(-50%, -50%) skewX(-15deg) scale(1.5);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <h1 id="drag-text">quiet intelligence</h1>

    <script>
        const text = document.getElementById("drag-text");
        const cursor = document.getElementById("custom-cursor");
        let isDragging = false, hasMoved = false;
        let offset = { x: 0, y: 0 };

        // SHARED MOVE LOGIC
        const updatePosition = (clientX, clientY) => {
            if(!hasMoved) { cursor.style.opacity = "1"; hasMoved = true; }
            
            cursor.style.left = clientX + "px";
            cursor.style.top = clientY + "px";
            
            if (isDragging) {
                text.style.left = (clientX - offset.x) + "px";
                text.style.top = (clientY - offset.y) + "px";
            }
        };

        // MOUSE EVENTS
        document.addEventListener("mousemove", (e) => updatePosition(e.clientX, e.clientY));

        text.addEventListener("mouseenter", () => document.body.classList.add('active-cursor'));
        text.addEventListener("mouseleave", () => {
            if (!isDragging) document.body.classList.remove('active-cursor');
        });

        text.addEventListener("mousedown", (e) => {
            isDragging = true;
            document.body.classList.add('active-cursor');
            offset.x = e.clientX - text.offsetLeft;
            offset.y = e.clientY - text.offsetTop;
            text.style.margin = "0"; text.style.transform = "none";
        });

        document.addEventListener("mouseup", (e) => {
            isDragging = false;
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el !== text) document.body.classList.remove('active-cursor');
        });

        // TOUCH EVENTS (DRAG ONLY)
        text.addEventListener("touchstart", (e) => {
            isDragging = true;
            const t = e.touches[0];
            offset.x = t.clientX - text.offsetLeft;
            offset.y = t.clientY - text.offsetTop;
            document.body.classList.add('active-cursor');
        });

        document.addEventListener("touchmove", (e) => {
            if (!isDragging) return;
            const t = e.touches[0];
            updatePosition(t.clientX, t.clientY);
            text.style.margin = "0"; text.style.transform = "none";
        }, { passive: false });

        document.addEventListener("touchend", () => {
            isDragging = false;
            document.body.classList.remove('active-cursor');
        });
    </script>
</body>
</html>
