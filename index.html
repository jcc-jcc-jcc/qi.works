<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qi.works</title>
    <style>
        /* 1. Register the custom font */
        @font-face {
            font-family: 'RadioGrotesk';
            src: url('PPRadioGrotesk-BoldItalic.woff') format('woff');
            font-weight: bold;
            font-style: italic;
            font-display: swap;
        }

        /* 2. Center everything on the screen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'RadioGrotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 3. The Minimalist Text */
        h1 {
            font-size: 10px;           /* The tiny "micro" look */
            font-weight: bold;
            font-style: italic;
            letter-spacing: 0.15em;    /* Wide spacing for a premium feel */
            text-transform: lowercase; 
            text-decoration: none;
            
            /* Slow, smooth fade-in */
            opacity: 0;
            animation: fadeIn 3s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>quiet intelligence</h1>

</body>
</html>
